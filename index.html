<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natane's Voxel &amp; Data Forge</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header id="topbar">
    <h1>🛠️ Natane's Voxel &amp; Data Forge <span class="tag">MVP</span></h1>
    <div class="status">ボクセル数: <b id="voxel-count">0</b></div>
  </header>

  <div id="app">
    <aside id="sidebar">
      <section class="panel">
        <h2>テンプレート</h2>
        <select id="template-select" class="wide-select"></select>
        <button id="btn-load-template" class="wide">雛形を読み込む</button>
        <p class="hint">防具・武器・モブのざっくり形状から開始できます。</p>
      </section>

      <section class="panel">
        <h2>モード</h2>
        <div class="mode-row">
          <button class="mode-btn active" data-mode="add">追加</button>
          <button class="mode-btn" data-mode="remove">削除</button>
          <button class="mode-btn" data-mode="paint">塗装</button>
        </div>
      </section>

      <section class="panel">
        <h2>カラー</h2>
        <div id="palette" class="palette"></div>
        <label class="field">
          <span>カスタム色</span>
          <input type="color" id="color-picker" value="#3a8ee6" />
        </label>
      </section>

      <section class="panel">
        <h2>グリッド（可変）</h2>
        <div class="grid-inputs">
          <label>X<input type="number" id="grid-x" value="16" min="1" max="64" /></label>
          <label>Y<input type="number" id="grid-y" value="16" min="1" max="64" /></label>
          <label>Z<input type="number" id="grid-z" value="16" min="1" max="64" /></label>
        </div>
        <button id="btn-resize" class="wide">サイズ適用</button>
        <p class="hint">アイテムは16推奨。モブ等は大きめに。</p>
      </section>

      <section class="panel">
        <h2>メタデータ＆メモ</h2>
        <label class="field"><span>種別</span>
          <select id="meta-type">
            <option value="item">アイテム</option>
            <option value="weapon">武器</option>
            <option value="tool">道具</option>
            <option value="armor">防具</option>
            <option value="gun">銃</option>
            <option value="block">ブロック</option>
            <option value="mob">モブ</option>
            <option value="material">素材</option>
          </select></label>
        <label class="field"><span>表示名</span>
          <input type="text" id="meta-name" placeholder="例: 試作型魔導銃" /></label>
        <label class="field"><span>用途・想定挙動メモ（Mod制作用）</span>
          <textarea id="meta-intent" rows="2" placeholder="例: 右クリックで火球を発射する魔法の杖"></textarea></label>

        <details class="sub">
          <summary>戦闘ステータス</summary>
          <div class="grid-inputs2">
            <label>攻撃力<input type="number" id="st-attack" value="0" step="0.5" /></label>
            <label>攻撃速度<input type="number" id="st-attackspeed" value="0" step="0.1" /></label>
            <label>耐久値<input type="number" id="st-durability" value="0" /></label>
            <label>射程<input type="number" id="st-range" value="0" step="0.5" /></label>
            <label>装弾数<input type="number" id="st-magazine" value="0" /></label>
            <label>リロード<input type="number" id="st-reload" value="0" step="0.1" /></label>
          </div>
        </details>

        <details class="sub">
          <summary>特殊能力</summary>
          <div id="ability-list" class="abilities"></div>
        </details>

        <details class="sub" open>
          <summary>入手方法メモ</summary>
          <label class="field"><span>入手手段</span>
            <select id="acq-method">
              <option value="crafting">クラフト</option>
              <option value="drop">ドロップ</option>
              <option value="both">両方</option>
              <option value="other">その他</option>
              <option value="none">なし</option>
            </select></label>
          <span class="mini">クラフト（3×3・アイテムID）</span>
          <div id="craft-grid" class="craft-grid"></div>
          <label class="field"><span>完成数</span>
            <input type="number" id="craft-count" value="1" min="1" /></label>
          <label class="field"><span>ドロップ元メモ</span>
            <textarea id="drop-note" rows="2" placeholder="例: ゾンビ 5% / 鉄鉱石ブロック 確定1"></textarea></label>
          <label class="field"><span>自由メモ</span>
            <textarea id="free-note" rows="2"></textarea></label>
        </details>
      </section>

      <section class="panel">
        <h2>出力設定</h2>
        <label class="field"><span>namespace</span>
          <input type="text" id="namespace" value="natane_forge" /></label>
        <label class="field"><span>アイテムID</span>
          <input type="text" id="item-id" value="custom_item" /></label>
        <label class="field"><span>pack_format</span>
          <input type="number" id="pack-format" value="34" min="1" /></label>
        <p class="hint">pack_format例: 1.21.4→46, 1.21→34, 1.20.1→15</p>
      </section>

      <section class="panel actions">
        <button id="btn-clear" class="wide danger">すべてクリア</button>
        <button id="btn-export" class="wide primary">📦 アセットを出力</button>
        <p id="export-info" class="hint"></p>
      </section>
    </aside>

    <main id="canvas-container"></main>
  </div>

  <!-- ライブラリ(CDN / UMDグローバル版): file:// 直開きでも動作 -->
  <script src="https://unpkg.com/three@0.137.5/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.137.5/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <!-- アプリ本体（読み込み順が依存順） -->
  <script src="js/voxelData.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/greedyMesh.js"></script>
  <script src="js/texture.js"></script>
  <script src="js/exporters/mcJavaItem.js"></script>
  <script src="js/spec.js"></script>
  <script src="js/packZip.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
